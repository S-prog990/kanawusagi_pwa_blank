<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>カナウサギのんびり日より</title>
  <meta name="theme-color" content="#d84f7b">
  <link rel="manifest" href="./manifest.json?v=20260509fix">
  <link rel="icon" href="./assets/icon-192.png?v=20260509fix">
  <link rel="stylesheet" href="./style.css?v=20260509fix">
</head>
<body>
<div id="app" class="app">
  <header class="header">
    <div class="titleLine">
      <h1 id="appTitle">🐾 カナウサギのんびり日より 🐾</h1>
      <button id="installBtn" class="ghost" hidden>アプリとして追加</button>
    </div>
    <div class="titleEdit">
      <label>タイトル</label><input id="titleInput" type="text"><button id="saveTitleBtn">タイトル反映</button>
    </div>
  </header>

  <main class="layout">
    <section class="mainPanel">
      <div class="mediaControls">
        <label id="mediaTitleLabel">今日のカナウサギ</label>
        <input id="mediaTitleInput" type="text" value="今日のカナウサギ">
        <button id="saveMediaTitleBtn">タイトル反映</button>
        <button id="mediaPickBtn">画像/動画 入替</button>
        <button id="mediaFitBtn">枠ぴったり</button>
        <button id="mediaPauseBtn">⏸ 一時停止</button>
        <button id="mediaClearBtn" class="dangerLight">解除</button>
        <input id="mediaFile" type="file" accept="image/*,video/*" hidden>
      </div>
      <div class="mediaStage" id="mediaStage">
        <img id="mediaImg" alt="カナウサギ画像">
        <video id="mediaVideo" muted loop playsinline controls></video>
        <div id="mediaEmpty" class="mediaEmpty">画像・動画を取り込めます</div>
      </div>
      <p id="mediaHint" class="hint"></p>

      <div class="dateCards">
        <div class="dateCard"><span>今日の日付だよ〜</span><strong id="todayText"></strong></div>
        <div class="dateCard pink"><span>予定有無</span><strong id="todayFlag">予定なし</strong></div>
      </div>

      <section class="calendarBox">
        <div class="calendarToolbar">
          <h2 id="calendarTitle"></h2>
          <button id="prevMonth">◀</button><button id="nextMonth">▶</button><button id="addMonthBtn">＋1ヶ月追加</button>
          <label>検索</label><input id="searchInput" type="search" placeholder="予定・メモ検索">
          <button id="addScheduleBtn">選択日に予定入力</button>
          <button id="csvBtn">予定CSV出力</button>
          <button id="mailBtn">予定メール作成</button>
        </div>
        <div id="calendarGrid" class="calendarGrid"></div>
      </section>

      <section class="selectedSchedules">
        <h2 id="selectedTitle">選択日の予定</h2>
        <div id="selectedList"></div>
      </section>
    </section>

    <aside class="sidePanel">
      <section class="clockBox">
        <div class="clockHead"><strong>時計</strong><select id="clockStyle"><option>ピンクもふ</option><option>クラシック</option><option>ソーダブルー</option><option>ネオン夜</option><option>画像取り込み</option></select><input id="clockImageFile" type="file" accept="image/*" hidden></div>
        <canvas id="clockCanvas" width="180" height="180"></canvas>
        <div id="digitalClock" class="digitalClock">00:00:00</div>
      </section>

      <section class="favInput">
        <h2>Sunoお気に入り</h2>
        <input id="favName" placeholder="名前 例：SilentNoise">
        <input id="favUrl" placeholder="URL https://suno.com/...">
        <input id="favMemo" placeholder="メモ">
        <button id="addFavBtn">お気に入り登録</button>
      </section>

      <section class="shortcuts">
        <button id="favSidebarBtn" class="dark">お気に入りページリスト</button>
        <button id="sunoBtn">Sunoを開く</button>
        <button id="xBtn">X投稿を開く</button>
        <button id="backupBtn">JSONバックアップ</button>
        <button id="restoreBtn">JSON読み込み</button>
        <input id="restoreFile" type="file" accept="application/json,.json" hidden>
      </section>

      <section class="favListBox">
        <h2>お気に入りリスト</h2>
        <div id="favList" class="favList"></div>
      </section>
    </aside>
  </main>
</div>

<div id="scheduleModal" class="modal" hidden>
  <div class="modalCard large">
    <div class="modalHead"><h2 id="scheduleModalTitle">予定入力</h2><button class="close" data-close="scheduleModal">×</button></div>
    <div class="formGrid">
      <label>開始日</label><input id="schStart" type="date">
      <label>終了日</label><input id="schEnd" type="date">
      <label>開始時刻</label><select id="schStartTime"></select>
      <label>終了時刻</label><select id="schEndTime"></select>
      <label>予定</label><input id="schTitle" type="text">
      <label>メモ</label><input id="schMemo" type="text">
      <label>種別</label><select id="schKind"><option>日常</option><option>制作</option><option>Suno</option><option>仕事</option><option>休み</option><option>通院</option><option>買い物</option><option>イベント</option><option>メモ</option><option>その他</option></select>
      <label>予定有無</label><select id="schFlag"><option>予定あり</option><option>予定なし</option></select>
      <label>優先度</label><select id="schPriority"><option>高</option><option selected>中</option><option>低</option></select>
      <label>状態</label><select id="schState"><option>未着手</option><option>進行中</option><option>完了</option><option>保留</option><option>キャンセル</option></select>
    </div>
    <button id="saveScheduleBtn" class="wide danger">保存して反映</button>
    <h3>登録済み予定</h3>
    <div id="scheduleEditList" class="editList"></div>
  </div>
</div>

<div id="favModal" class="modal" hidden>
  <div class="modalCard favModalCard">
    <div class="modalHead"><h2>Sunoお気に入りページリスト</h2><button class="close" data-close="favModal">×</button></div>
    <div class="favSidebarLayout">
      <div id="favSideList" class="favSideList"></div>
      <div class="favDetail"><h2 id="favDetailName">お気に入りを選択</h2><p id="favDetailMemo"></p><p id="favDetailUrl" class="small"></p><button id="favOpenBtn">このページを開く</button><button id="favEditBtn">編集</button><button id="favDeleteBtn" class="dangerLight">削除</button></div>
    </div>
  </div>
</div>

<div id="favEditModal" class="modal" hidden>
  <div class="modalCard">
    <div class="modalHead"><h2>お気に入り編集</h2><button class="close" data-close="favEditModal">×</button></div>
    <input id="editFavName" placeholder="名前"><input id="editFavUrl" placeholder="URL"><input id="editFavMemo" placeholder="メモ"><button id="saveFavEditBtn">保存</button>
  </div>
</div>

<script src="./script.js?v=20260509fix" defer></script>
</body>
</html>
